root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/main ./cmd/server"
entrypoint = "./tmp/main"
include_ext = ["go", "tpl", "tmpl", "html", "sql"]
exclude_dir = ["tmp", "vendor", "frontend", "node_modules", "dist"]
exclude_regex = ["_test.go"]
delay = 200
stop_on_error = true
send_interrupt = true
kill_delay = 500

[log]
time = true

[color]
main = "cyan"
watcher = "yellow"
build = "green"
runner = "magenta"
