services:
  postgres:
    image: postgres:16
    container_name: crawl-pic-postgres
    environment:
      POSTGRES_USER: crawler
      POSTGRES_PASSWORD: crawler
      POSTGRES_DB: crawl_pic
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crawler -d crawl_pic"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
